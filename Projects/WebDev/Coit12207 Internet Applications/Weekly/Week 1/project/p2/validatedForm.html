<!DOCTYPE html>
<html>

<head>
  <title>Student Form</title>
  <link rel="stylesheet" type="text/css" href="./style.css">
</head>

<body>
  <form id="form" name="myForm" onsubmit="confirmation()" method="post">
  <div class="zone blue">
    <div class="main-ban">Student Programing Skills Form</div>
  </div>

  <div class="bodyForm">
    <div class="container zone">
     
        <div class="form-control">
          <label for="studentID" id="label-id">
            Student ID
          </label>
          <input type="text" id="studentID" name="studentID" pattern="[0-9]{8}" placeholder="Enter your studentID" required/>
        </div>
        <div class="form-control">
          <label for="name" id="label-name"> Full Name</label>
          <input type="text" id="name" name="fullname" maxlength="20" placeholder="Enter your name" required />
        </div>
        <div class="form-control">
          <label for="email" id="label-email" name="email"> Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" multiple required/>
        </div>
        <div class="form-control">
          <label for="Phone" id="label-phone"> Phone Number</label>
          <input type="tel" id="phone"  name="phone" pattern="[0-9]{4}-[0-9]{3}-[0-9]{3}" placeholder="Enter your Phone number" required/>
        </div>
        <div class="form-control">
          <label for="campus" id="label-campus">
            Which campus are you enrolled?
          </label>
          <!-- Drop down-->
          <select name="campus" id="campus">
            <option value="Brisbane">Brisbane</option>
            <option value="Cairns">Cairns</option>
            <option value="Melbourn">Melbourn</option>
            <option value="Rockhampton">Rockhampton</option>
            <option value="Sydney">Sydney</option>
            <option value="Townsville">Townsville</option>
            <option value="Online">Online</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-control">
          <label>Languages and Frameworks known
            <small>(Check all that apply)</small>
          </label>
          <div class="lang">
            <!-- Input Type Checkbox -->
            <label for="inp-1">
              <input type="checkbox" name="inp" value="C">C</input>
            </label>
            <label for="inp-2">
              <input type="checkbox" name="inp" value="C++">C++</input></label>
            <label for="inp-3">
              <input type="checkbox" name="inp" value="C#">C#</input> </label>
            <label for="inp-4">
              <input type="checkbox" name="inp" value="Java">Java</input></label>
            <label for="inp-5">
              <input type="checkbox" name="inp" value="Python">Python</input></label>
            <label for="inp-6">
              <input type="checkbox" name="inp" value="JavaScript">JavaScript</input></label>
            <label for="inp-7">
              <input type="checkbox" name="inp" value="React">React</input></label>
            <label for="inp-7">
              <input type="checkbox" name="inp" value="Angular">Angular</input></label>
            <label for="inp-7">
              <input type="checkbox" name="inp" value="Django">Django</input></label>
            <label for="inp-7">
              <input type="checkbox" name="inp" value="Spring">Spring</input></label>
          </div>
        </div>
        <div class="form-control">
          <label for="comment">
            Comments and suggestions
          </label>

          <!--Multi-line text input-->
          <textarea name="comment" id="comment" placeholder="Enter your comment here"></textarea>
        </div>
    </div>
  </div>
  <div class="foot">
    <footer class="zone green footer sticky">
      <button type="submit" value="submit">Submit</button>
    </footer>
  </div>
</form>
</body>

</html>

<script>
  function confirmation(){
    window.confirm("Survey completed. thank you");
  }
</script>
